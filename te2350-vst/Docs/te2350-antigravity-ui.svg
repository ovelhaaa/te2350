      .small { font-family: "Arial Narrow", "Bahnschrift", Arial, sans-serif; letter-spacing: 0; fill: #8192a9; font-size: 10px; }
      .code { font-family: "Bahnschrift", "Arial Narrow", Arial, sans-serif; fill: #8192a9; font-size: 10px; }
      .panel { fill: url(#panelFill); stroke: #203248; stroke-width: 1; }
      .thin { stroke: #203248; stroke-width: 1; fill: none; }
      .cyan { stroke: #27d9ff; }
      .violet { stroke: #9b62ff; }
      .amber { stroke: #ffb451; }
      .green { stroke: #62f0b1; }
    </style>
  </defs>

