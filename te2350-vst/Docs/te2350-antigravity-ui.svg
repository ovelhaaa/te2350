<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">TE-2350 Antigravity plugin interface mockup</title>
  <desc id="desc">Dark orbital ambient delay reverb plugin UI with three large macro controls and sci-fi telemetry panels.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="58%" cy="28%" r="72%">
      <stop offset="0" stop-color="#172b5c"/>
      <stop offset="0.44" stop-color="#110f2e"/>
      <stop offset="0.78" stop-color="#070c16"/>
      <stop offset="1" stop-color="#05070c"/>
    </radialGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101b2b"/>
      <stop offset="0.52" stop-color="#0b1320"/>
      <stop offset="1" stop-color="#111022"/>
    </linearGradient>
    <linearGradient id="cyanAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27d9ff"/>
      <stop offset="0.52" stop-color="#62f0b1"/>
      <stop offset="1" stop-color="#ffb451"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
