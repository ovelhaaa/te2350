name: Build TE-2350 Antigravity

on:
  push:
    branches: [ main, master ]
    paths:
      - ".github/workflows/build-plugin.yml"
      - "te2350-vst/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
  pull_request:
    paths:
      - ".github/workflows/build-plugin.yml"
      - "te2350-vst/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: te2350-plugin-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build/te2350-vst
  JUCE_TAG: 8.0.8

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows VST3
            os: windows-latest
            artifact: te2350-antigravity-windows-vst3
          - name: macOS VST3 + AU
            os: macos-14
            artifact: te2350-antigravity-macos-vst3-au

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache JUCE and CMake dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/_deps
            ${{ env.BUILD_DIR }}/JUCE
          key: ${{ runner.os }}-juce-${{ env.JUCE_TAG }}-${{ hashFiles('te2350-vst/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-juce-${{ env.JUCE_TAG }}-

      - name: Configure
        shell: pwsh
        run: |
          cmake `
            -S "te2350-vst" `
            -B "${{ env.BUILD_DIR }}" `
            -G "Ninja" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "-DTE2350_FETCH_JUCE=ON" `
            "-DTE2350_JUCE_TAG=${{ env.JUCE_TAG }}" `
            "-DTE2350_BUILD_GOLDEN_TESTS=ON" `
            "-DTE2350_PLUGIN_COPY_DIR=${{ github.workspace }}/build/installed-plugins"

      - name: Build plugin and validation tools
        run: cmake --build "${{ env.BUILD_DIR }}" --parallel 4

      - name: Run CTest validation
        run: ctest --test-dir "${{ env.BUILD_DIR }}" --output-on-failure

      - name: Download pluginval
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force tools/pluginval | Out-Null

          $release = gh api repos/Tracktion/pluginval/releases/latest | ConvertFrom-Json
          $assetPattern = if ($env:RUNNER_OS -eq "Windows") {
            "win|windows"
          } elseif ($env:RUNNER_OS -eq "macOS") {
            "mac|macos|osx|darwin"
          } else {
            "linux"
          }

          $assets = @($release.assets | Where-Object { $_.name -match $assetPattern })
          if ($assets.Count -eq 0) {
            $available = ($release.assets | ForEach-Object { $_.name }) -join ", "
            throw "No pluginval asset matched '$assetPattern'. Available assets: $available"
          }

          foreach ($asset in $assets) {
            gh release download $release.tag_name --repo Tracktion/pluginval --pattern $asset.name --dir tools/pluginval --clobber
          }

          Get-ChildItem tools/pluginval -File | ForEach-Object {
            if ($_.Extension -eq ".zip") {
              Expand-Archive -LiteralPath $_.FullName -DestinationPath tools/pluginval -Force
            } elseif ($_.Name -like "*.tar.gz" -or $_.Extension -eq ".tgz") {
              tar -xf $_.FullName -C tools/pluginval
            }
          }

          $pluginval = Get-ChildItem tools/pluginval -Recurse -File |
            Where-Object { $_.Name -eq "pluginval.exe" -or $_.Name -eq "pluginval" } |
            Select-Object -First 1

          if ($null -eq $pluginval) {
            throw "pluginval executable was not found in downloaded release assets"
          }

          if ($env:RUNNER_OS -ne "Windows") {
            chmod +x $pluginval.FullName
          }

          "PLUGINVAL=$($pluginval.FullName)" >> $env:GITHUB_ENV

      - name: Validate plugin bundles with pluginval
        shell: pwsh
        run: |
          $plugins = @(Get-ChildItem "${{ env.BUILD_DIR }}" -Recurse -Directory -Filter "*.vst3" |
            Where-Object { $_.Name -like "*Antigravity*" })

          if ($env:RUNNER_OS -eq "macOS") {
            $componentInstallDir = Join-Path $HOME "Library/Audio/Plug-Ins/Components"
            New-Item -ItemType Directory -Force $componentInstallDir | Out-Null

            $components = @(Get-ChildItem "${{ env.BUILD_DIR }}" -Recurse -Directory -Filter "*.component" |
              Where-Object { $_.Name -like "*Antigravity*" })

            foreach ($component in $components) {
              $installedComponent = Join-Path $componentInstallDir $component.Name
              if (Test-Path $installedComponent) {
                Remove-Item -Recurse -Force $installedComponent
              }

              Copy-Item -Recurse -Force $component.FullName $installedComponent
              $plugins += Get-Item $installedComponent
            }
          }

          if ($plugins.Count -eq 0) {
            throw "No TE-2350 Antigravity plugin bundle was found"
          }

          foreach ($plugin in $plugins) {
            Write-Host "Validating $($plugin.FullName)"
            & "$env:PLUGINVAL" --strictness-level 5 --validate-in-process --validate "$($plugin.FullName)"
          }

      - name: Upload plugin bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            ${{ env.BUILD_DIR }}/**/*Antigravity*.vst3/**
            ${{ env.BUILD_DIR }}/**/*Antigravity*.component/**

      - name: Upload golden-reference output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-golden-reference
          if-no-files-found: warn
          path: |
            ${{ env.BUILD_DIR }}/GoldenReferenceOutput/**
            ${{ env.BUILD_DIR }}/**/TE2350GoldenReference*
